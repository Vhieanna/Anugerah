<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aster Atas | System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --med-blue: #0ea5e9; --med-light: #f0f9ff; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card-med { background: white; padding: 45px; border-radius: 30px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f1f5f9; }
        .btn-main { background: var(--med-blue); color: white; border: none; padding: 14px; border-radius: 14px; width: 100%; font-weight: 700; margin-top: 15px; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-guest { background: transparent; color: var(--med-blue); border: 2px solid var(--med-light); padding: 12px; border-radius: 14px; width: 100%; margin-top: 10px; font-weight: 600; }
        .hidden { display: none !important; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div id="login-container" class="card-med">
    <div style="background: var(--med-blue); width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
    </div>
    <h4 class="fw-bold mb-1">Aster Atas</h4>
    <p class="text-muted small mb-4">Rumah Sakit Management System</p>
    
    <input type="password" id="pw" class="form-control text-center py-3 border-0 bg-light rounded-4 mb-3" placeholder="Password Admin">
    
    <button onclick="prosesLogin('admin')" id="btnAdmin" class="btn-main">Masuk Sebagai Admin</button>
    <button onclick="prosesLogin('guest')" id="btnGuest" class="btn-guest">Lihat Jadwal (Tamu)</button>
</div>

<div id="dashboard" class="hidden text-center p-5">
    <div class="card-med" style="max-width: 600px;">
        <h2 id="welcome-msg" class="fw-bold text-primary"></h2>
        <p class="text-muted">Sistem sedang menyiapkan data jadwal Anda...</p>
        <button onclick="location.reload()" class="btn btn-outline-danger mt-4 rounded-3">Keluar Sistem</button>
    </div>
</div>

<script>
    // MASUKKAN URL HASIL DEPLOY GAS ANDA DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi8R0Y2jnubEskS6Dl-yPD6m84oTtIs0ALuR9notdB2wts27LcrQQzQyPccdjs1yzBJg/exec";

    async function prosesLogin(role) {
        const pwInput = document.getElementById('pw').value;
        const container = document.getElementById('login-container');
        
        if (role === 'admin' && !pwInput) return alert("Masukkan password admin!");

        container.classList.add('loading');
        
        // Membentuk URL permintaan
        let finalUrl = SCRIPT_URL + "?action=" + (role === 'admin' ? "login&pw=" + encodeURIComponent(pwInput) : "get_roster");

        try {
            // Menggunakan fetch dengan mode 'no-cors' tidak akan bisa membaca JSON. 
            // Kita gunakan cara standar namun script GAS sudah kita set agar ramah CORS.
            const response = await fetch(finalUrl);
            const resData = await response.json();

            if (resData.status === "success") {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = (role === 'admin') ? "Halo Admin Aster!" : "Halo Tamu Aster!";
            } else {
                alert(resData.message);
                container.classList.remove('loading');
            }
        } catch (error) {
            console.error(error);
            alert("Koneksi gagal! Pastikan URL Deployment sudah benar dan sudah di-Set ke 'Anyone'.");
            container.classList.remove('loading');
        }
    }
</script>
</body>
</html>
