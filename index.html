<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT | Aster Atas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #007bff; --soft-bg: #f8fafc; }
        body { background: var(--soft-bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s; }
        #splash img { width: 150px; margin-bottom: 15px; }
        .tagline { color: #8899a6; font-size: 14px; letter-spacing: 1px; }

        /* Dashboard Layout */
        .main-container { display: flex; height: 100vh; width: 100%; opacity: 0; transition: 1s; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #eef2f6; padding: 30px 20px; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        
        .menu-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; color: #64748b; transition: 0.3s; margin-bottom: 5px; font-weight: 500; }
        .menu-item:hover, .menu-item.active { background: #e0f2fe; color: var(--primary); }
        
        .card-custom { background: white; border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.02); padding: 30px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo splash.png">
    <p class="tagline">Your Health, Our Priority</p>
    <div class="spinner-border text-primary mt-3" role="status"></div>
</div>

<div id="app" class="main-container">
    <div class="sidebar">
        <img src="Logo Medi.png" style="width: 180px; margin-bottom: 40px;">
        <div class="menu-item active" onclick="showTab('request')"><i class="bi bi-pencil-square me-2"></i> Permintaan Staf</div>
        <div class="menu-item" onclick="showTab('generate')"><i class="bi bi-cpu me-2"></i> Generate Jadwal</div>
        <div class="menu-item" onclick="showTab('log')"><i class="bi bi-journal-text me-2"></i> Log Keputusan</div>
        <div class="mt-auto"><hr><div class="menu-item text-danger" onclick="location.reload()"><i class="bi bi-box-arrow-left me-2"></i> Keluar</div></div>
    </div>

    <div class="content">
        <h2 id="title" class="fw-bold mb-4">Input Permintaan</h2>
        
        <div id="tab-request" class="tab-content">
            <div class="card-custom mb-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="small fw-bold">Nama Staf</label>
                        <select id="stafList" class="form-select"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="small fw-bold">Tanggal</label>
                        <input type="date" id="targetDate" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="small fw-bold">Jenis</label>
                        <select id="typeReq" class="form-select">
                            <option value="Off">Permintaan Off</option>
                            <option value="Tukar">Tukar Shift</option>
                            <option value="Cuti">Cuti</option>
                        </select>
                    </div>
                    <div class="col-12 text-end">
                        <button onclick="submitRequest()" class="btn btn-primary px-4">Validasi & Simpan</button>
                    </div>
                </div>
            </div>

            <div id="alert-panel" class="hidden alert alert-warning rounded-4 p-4">
                <h5 class="fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i> Ada Benturan!</h5>
                <p id="alert-msg"></p>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-sm btn-dark" onclick="manualOverride()">Intervensi Admin (Tetap Simpan)</button>
                </div>
            </div>
        </div>

        <div id="tab-log" class="tab-content hidden">
            <div class="card-custom">
                <div id="log-table" class="table-responsive"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycby-ayLfytVsskkZXag4mURSCvxLJWb_W8B5KHTQssitg00mAsJRjXJp7Gy0ciBSq4aDEw/exec";

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('app').style.opacity = '1';
                loadStaf();
            }, 800);
        }, 3000);
    };

    function callAPI(params, callback) {
        const cbName = 'cb_' + Date.now();
        window[cbName] = callback;
        const script = document.createElement('script');
        script.src = `${API}?${params}&callback=${cbName}`;
        document.body.appendChild(script);
    }

    function loadStaf() {
        callAPI('action=get_staf', (res) => {
            const sel = document.getElementById('stafList');
            res.data.forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);
        });
    }

    function submitRequest() {
        const nama = document.getElementById('stafList').value;
        const tgl = document.getElementById('targetDate').value;
        const tipe = document.getElementById('typeReq').value;
        
        callAPI(`action=submit_request&nama=${nama}&tanggal=${tgl}&jenis=${tipe}`, (res) => {
            if (res.status === "conflict") {
                document.getElementById('alert-panel').classList.remove('hidden');
                document.getElementById('alert-msg').innerText = `${res.message} Saran: ${res.saran}`;
            } else {
                alert(res.message);
                document.getElementById('alert-panel').classList.add('hidden');
            }
        });
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if (tab === 'log') loadLog();
    }

    function loadLog() {
        callAPI('action=get_log', (res) => {
            let h = '<table class="table small"><thead><tr><th>Waktu</th><th>Nama</th><th>Tgl</th><th>Status</th><th>Alasan</th></tr></thead><tbody>';
            res.data.slice(1).reverse().forEach(r => {
                h += `<tr><td>${new Date(r[0]).toLocaleDateString()}</td><td>${r[1]}</td><td>${r[2]}</td><td><span class="badge ${r[3]=='DITOLAK'?'bg-danger':'bg-success'}">${r[3]}</span></td><td>${r[4]}</td></tr>`;
            });
            document.getElementById('log-table').innerHTML = h + '</tbody></table>';
        });
    }
</script>
</body>
</html>
