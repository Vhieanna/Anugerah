<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-blue: #007bff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f8fafc; overflow: hidden; font-family: sans-serif; }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #splash-screen img { width: 250px; height: auto; margin-bottom: 25px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* LOGIN PAGE */
        .auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { 
            background: white; padding: 50px 40px; border-radius: 35px; 
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 70px rgba(0,0,0,0.07); border: 1px solid #f1f5f9;
        }
        /* Logo Login Page diperbesar & Teks dihapus */
        .login-logo { width: 280px; height: auto; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; }
        
        .form-control { border-radius: 15px; padding: 14px; border: 1.5px solid #e2e8f0; margin-bottom: 15px; text-align: center; font-size: 16px; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1); border-color: var(--primary-blue); }
        
        .btn-main { background: var(--primary-blue); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .btn-guest { background: #f0f9ff; color: var(--primary-blue); border: none; padding: 14px; border-radius: 15px; width: 100%; margin-top: 12px; font-weight: 600; }
        
        .hidden { display: none !important; }
        #loading-text { color: var(--primary-blue); font-size: 0.9rem; margin-top: 20px; font-weight: 600; }
        
        /* Dashboard */
        .dash-card { max-width: 900px; width: 95%; background: white; border-radius: 30px; padding: 30px; }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="Logo Splash.png" alt="Splash Logo">
    <div class="spinner-border text-primary" style="width: 2rem; height: 2rem;" role="status"></div>
</div>

<div id="app-content" class="hidden">
    <div class="auth-container">
        <div id="login-ui" class="auth-card">
            <img src="Logo Medi.png" alt="Medi Sift Logo" class="login-logo">
            
            <div id="input-area">
                <input type="text" id="userInput" class="form-control" placeholder="Username" autocomplete="off">
                <input type="password" id="passInput" class="form-control" placeholder="Password">
                
                <button onclick="prosesData('login')" class="btn btn-main shadow-sm">Masuk Admin</button>
                <button onclick="prosesData('guest')" class="btn btn-guest">Lihat Jadwal (Tamu)</button>
            </div>

            <div id="loading-text" class="hidden">
                <div class="spinner-grow spinner-grow-sm me-2"></div> Menghubungkan ke pusat data...
            </div>
        </div>

        <div id="dash-ui" class="hidden dash-card text-center box-shadow">
            <h3 id="user-greet" class="text-primary fw-bold mb-4"></h3>
            <div id="table-output" class="table-responsive text-start"></div>
            <button onclick="location.reload()" class="btn btn-outline-danger mt-4 px-5 rounded-pill">Keluar</button>
        </div>
    </div>
</div>

<script>
    // URL API yang sudah dibersihkan dari /u/6/
    const API_URL = "https://script.google.com/macros/s/AKfycbyZxSlkwBzm06xCmKxm7xVckSxoTKgyRpY-5moj5nLWRvkgut_vFXGuQeHaperOvLNGKw/exec";

    // Kontrol Splash Screen
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.body.style.overflow = 'auto';
            }, 800);
        }, 3000); // Tampil selama 3 detik
    });

    function prosesData(tipe) {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        const load = document.getElementById('loading-text');
        const area = document.getElementById('input-area');

        if(tipe === 'login' && (!u || !p)) return alert("Masukkan Username & Password!");

        load.classList.remove('hidden');
        area.classList.add('hidden');

        // Menggunakan teknik JSONP untuk menembus CORS
        const callbackName = 'jsonp_' + Math.floor(Math.random() * 100000);
        window[callbackName] = function(res) {
            load.classList.add('hidden');
            if(res.status === "success") {
                renderDashboard(res, tipe);
            } else {
                area.classList.remove('hidden');
                alert("Gagal: " + res.message);
            }
            delete window[callbackName];
            const s = document.getElementById('jsonp-script');
            if(s) s.remove();
        };

        const script = document.createElement('script');
        script.id = 'jsonp-script';
        script.src = `${API_URL}?action=${tipe === 'login' ? 'login' : 'get_roster'}&user=${encodeURIComponent(u)}&pw=${encodeURIComponent(p)}&callback=${callbackName}`;
        
        script.onerror = () => {
            load.classList.add('hidden');
            area.classList.remove('hidden');
            alert("Koneksi gagal atau URL API tidak merespon.");
        };
        document.body.appendChild(script);
    }

    function renderDashboard(res, tipe) {
        document.getElementById('login-ui').classList.add('hidden');
        document.getElementById('dash-ui').classList.remove('hidden');
        document.getElementById('user-greet').innerText = "Halo, " + (tipe === 'login' ? res.name : "Tamu");
        
        if(res.data) {
            let table = '<table class="table table-hover table-bordered border-light shadow-sm small">';
            res.data.forEach((row, idx) => {
                table += `<tr class="${idx === 0 ? 'table-primary' : ''}">`;
                row.forEach(cell => {
                    table += `<td>${cell}</td>`;
                });
                table += '</tr>';
            });
            document.getElementById('table-output').innerHTML = table + '</table>';
        }
    }
</script>
</body>
</html>
