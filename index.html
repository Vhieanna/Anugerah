<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial;
      background: #eef7fb;
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .btn {
      background: linear-gradient(to right, #2bb3c0, #6dd5ed);
      border: none;
      padding: 10px 15px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    input {
      padding: 8px;
      margin: 5px 0;
      width: 200px;
    }

    h2 {
      color: #2bb3c0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginPage" class="card">
    <h2>MediSift</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="guest()">Guest</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">

    <div class="card">
      <h2>Jadwal</h2>
      <button class="btn" onclick="loadJadwal()">Generate</button>
      <div id="jadwal"></div>
    </div>

    <div class="card">
      <h2>Konflik</h2>
      <div id="konflik"></div>
    </div>

  </div>

</div>

<script>
let role = "";

function login() {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  google.script.run.withSuccessHandler(res => {
    if (res.role === "admin") {
      role = "admin";
      showApp();
    } else {
      alert("Login gagal");
    }
  }).login(u, p);
}

function guest() {
  role = "guest";
  showApp();
}

function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadKonflik();
}

function loadJadwal() {
  google.script.run.withSuccessHandler(data => {
    let div = document.getElementById("jadwal");
    div.innerHTML = "";

    for (let tgl in data) {
      div.innerHTML += `<p>${tgl}</p>`;
    }
  }).generateSchedule();
}

// ================= KONFLIK =================
function loadKonflik() {
  google.script.run.withSuccessHandler(renderKonflik).getKonflikDetail();
}

function renderKonflik(data) {
  let div = document.getElementById("konflik");
  div.innerHTML = "";

  for (let tgl in data) {
    let k = data[tgl];

    let html = `<h3>${tgl}</h3>`;

    k.kandidat.forEach(c => {
      html += `
        <label>
          <input type="radio" name="${tgl}" value="${c.nama}">
          ${c.nama} (${c.jumlah} request)
        </label><br>
      `;
    });

    if (role === "admin") {
      html += `<button class="btn" onclick="pilih('${tgl}')">Pilih</button>`;
    } else {
      html += `<p><i>Mode Guest (view only)</i></p>`;
    }

    div.innerHTML += html;
  }
}

// ================= PILIH =================
function pilih(tanggal) {
  let radios = document.getElementsByName(tanggal);
  let dipilih;

  radios.forEach(r => {
    if (r.checked) dipilih = r.value;
  });

  if (!dipilih) {
    alert("Pilih salah satu dulu");
    return;
  }

  let ditolak = Array.from(radios)
    .map(r => r.value)
    .filter(n => n !== dipilih)[0];

  google.script.run.withSuccessHandler(() => {
    alert("Disimpan");
    loadRekomendasi(ditolak);
  }).simpanKeputusan(tanggal, dipilih, ditolak);
}

// ================= REKOMENDASI =================
function loadRekomendasi(nama) {
  google.script.run.withSuccessHandler(res => {
    let html = `<h3>Rekomendasi untuk ${nama}</h3>`;
    res.forEach(t => {
      html += `<p>${t}</p>`;
    });

    document.getElementById("konflik").innerHTML += html;
  }).rekomendasiTanggal(nama);
}
</script>

</body>
</html>
