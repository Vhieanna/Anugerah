<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MediSift</title>

<style>
body{font-family:Arial;background:#eef7fb}
.card{background:#fff;margin:20px;padding:20px;border-radius:10px}
.btn{background:#2bb3c0;color:white;border:none;padding:8px;margin:5px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.box{background:#f9f9f9;padding:10px;border-radius:8px}
</style>
</head>

<body>

<div class="card" id="loginPage">
<h2>MediSift</h2>
<input id="u" placeholder="username"><br>
<input id="p" type="password"><br>
<button onclick="login()">Login</button>
<button onclick="guest()">Guest</button>
</div>

<div id="app" style="display:none">

<div class="card"><b id="user"></b></div>

<div class="card">
<h3>Request</h3>
<div id="req"></div>
</div>

<div class="card">
<button onclick="gen()">Generate</button>
<button onclick="save()">Finalisasi</button>
<button onclick="print()">PDF</button>
</div>

<div class="card">
<h3>Kalender</h3>
<div id="kal" class="grid"></div>
</div>

</div>

<script>
const GAS="https://script.google.com/macros/s/AKfycbyO4ms9ohkBWCMgtbipw9LlbyM-4qFZ6_X6gapsscP_Y6GXLn8nLS6xg5i0L9fP5DrGoQ/exec";

let role="";

// LOGIN
function login(){
fetch(GAS,{
method:"POST",
body:JSON.stringify({
action:"login",
username:u.value,
password:p.value
})
}).then(r=>r.json()).then(res=>{
if(res.role==="admin"){
role="admin";
start(res.name);
}else alert("Login gagal");
});
}

function guest(){
role="guest";
start("Guest");
}

function start(name){
loginPage.style.display="none";
app.style.display="block";
user.innerText="Login: "+name;

loadReq();
}

// REQUEST
function loadReq(){
fetch(GAS+"?action=requests")
.then(r=>r.json())
.then(d=>{
let h="";
d.forEach(x=>{
h+=`
<div>${x.nama} ${x.tanggal} ${x.jenis} ${x.status}
${role==="admin"&&x.status==="PENDING"?
`<button onclick="ap(${x.row})">✔</button>
<button onclick="rj(${x.row})">✖</button>`:""}
</div>`;
});
req.innerHTML=h;
});
}

function ap(r){
fetch(GAS,{method:"POST",body:JSON.stringify({action:"approve",row:r})})
.then(loadReq);
}

function rj(r){
fetch(GAS,{method:"POST",body:JSON.stringify({action:"reject",row:r})})
.then(loadReq);
}

// GENERATE
function gen(){
fetch(GAS+"?action=generate")
.then(r=>r.json())
.then(render);
}

function render(d){
let h="";
for(let t in d){
h+=`<div class="box"><b>${t}</b><br>`;
for(let s in d[t]){
h+=`${s}: ${d[t][s]}<br>`;
}
h+="</div>";
}
kal.innerHTML=h;
}

// SAVE
function save(){
fetch(GAS+"?action=save")
.then(()=>alert("Final tersimpan"));
}
</script>

</body>
</html>
