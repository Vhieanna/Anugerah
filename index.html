<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT v.Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f9; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        .hidden { display: none !important; }
        #log { font-size: 11px; color: #666; margin-top: 20px; text-align: left; background: #eee; padding: 10px; border-radius: 8px; max-height: 100px; overflow: auto; }
    </style>
</head>
<body>

<div id="login-box" class="card">
    <h3 class="fw-bold mb-4">MEDI SIFT</h3>
    <input type="text" id="user" class="form-control mb-2" placeholder="Username">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
    <button onclick="kirim('admin')" class="btn btn-primary w-100 mb-2">Login Admin</button>
    <button onclick="kirim('guest')" class="btn btn-outline-secondary w-100">Akses Tamu</button>
    
    <div id="loader" class="hidden mt-3">
        <div class="spinner-border spinner-border-sm text-primary"></div>
        <span class="ms-2">Menghubungkan...</span>
    </div>
    <div id="log" class="hidden"></div>
</div>

<div id="dash" class="card hidden" style="width: 90%; max-width: 800px;">
    <h4 id="greet" class="fw-bold text-primary"></h4>
    <hr>
    <div id="tabel" class="table-responsive"></div>
    <button onclick="location.reload()" class="btn btn-danger btn-sm mt-3">Keluar</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZxSlkwBzm06xCmKxm7xVckSxoTKgyRpY-5moj5nLWRvkgut_vFXGuQeHaperOvLNGKw/exec";

    function addLog(msg) {
        const logBox = document.getElementById('log');
        logBox.classList.remove('hidden');
        logBox.innerHTML += "> " + msg + "<br>";
    }

    function kirim(role) {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const loader = document.getElementById('loader');
        
        addLog("Memulai koneksi ke Google...");
        loader.classList.remove('hidden');

        const callbackName = 'google_cb_' + Date.now();
        window[callbackName] = function(data) {
            addLog("Respon diterima dari Google.");
            loader.classList.add('hidden');
            if (data.status === "success") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
                document.getElementById('greet').innerText = "Halo, " + (data.name || "Tamu");
                if(data.data) render(data.data);
            } else {
                addLog("Error: " + data.message);
                alert(data.message);
            }
            delete window[callbackName];
        };

        const finalUrl = `${SCRIPT_URL}?action=${role==='admin'?'login':'get_roster'}&user=${encodeURIComponent(u)}&pw=${encodeURIComponent(p)}&callback=${callbackName}`;
        
        const script = document.createElement('script');
        script.src = finalUrl;
        script.onerror = () => {
            addLog("Gagal memuat Script. Cek koneksi atau URL.");
            loader.classList.add('hidden');
        };
        document.body.appendChild(script);
    }

    function render(data) {
        let h = '<table class="table table-sm table-bordered mt-2" style="font-size:12px;">';
        data.forEach(row => {
            h += '<tr>' + row.map(c => `<td>${c}</td>`).join('') + '</tr>';
        });
        document.getElementById('tabel').innerHTML = h + '</table>';
    }
</script>
</body>
</html>
