<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MediSift</title>

<style>
body { font-family: Arial; background:#eef7fb; }
.card { background:white; padding:20px; margin:20px; border-radius:12px; }
.btn { background:#2bb3c0; color:white; border:none; padding:8px; margin-top:5px; cursor:pointer; }
.shift-P { color:green; }
.shift-S { color:orange; }
.shift-M { color:red; }
</style>
</head>

<body>

<div class="card" id="loginPage">
<h2>MediSift</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="guest()">Guest</button>
</div>

<div id="app" style="display:none">

<div class="card">
<b id="userInfo"></b>
</div>

<div class="card">
<h3>Review Request</h3>
<div id="request"></div>
</div>

<div class="card">
<h3>Warning</h3>
<div id="warning"></div>
</div>

<div class="card">
<button class="btn" onclick="generate()">Generate Jadwal</button>
<div id="jadwal"></div>
</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxASU2M0LmtGthDODnrPZVH9EypHG41uhpZPtfWSItpN_-SXZBgIbuB_tx2AIRSP0AN3Q/exec";

let role="";
let currentUser="";

// LOGIN
function login(){
fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
username:username.value,
password:password.value
})
})
.then(r=>r.json())
.then(res=>{
if(res.role==="admin"){
role="admin";
currentUser=res.name;
showApp();
}else alert("Login gagal");
});
}

function guest(){
role="guest";
currentUser="Guest";
showApp();
}

function showApp(){
loginPage.style.display="none";
app.style.display="block";
userInfo.innerText="Login: "+currentUser;

loadRequest();
loadWarning();
}

// REQUEST
function loadRequest(){
fetch(GAS_URL+"?action=requests")
.then(r=>r.json())
.then(renderRequest);
}

function renderRequest(data){
let div=document.getElementById("request");
div.innerHTML="";

data.forEach(r=>{
let html=`
<div>
<b>${r.nama}</b> - ${r.tanggal} - ${r.jenis} (${r.shift_awal}→${r.shift_minta})<br>
Status: ${r.status}<br>
`;

if(role==="admin" && r.status==="PENDING"){
html+=`
<button onclick="approve(${r.row})">Approve</button>
<button onclick="reject(${r.row})">Reject</button>
`;
}

html+=`</div><hr>`;
div.innerHTML+=html;
});
}

function approve(row){
fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({action:"approve",row:row})
}).then(()=>loadRequest());
}

function reject(row){
fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({action:"reject",row:row})
}).then(()=>loadRequest());
}

// WARNING
function loadWarning(){
fetch(GAS_URL+"?action=warning")
.then(r=>r.json())
.then(res=>{
let div=document.getElementById("warning");
div.innerHTML="";
res.forEach(w=>{
div.innerHTML+=`<p style="color:red">${w.nama} ${w.tgl} : ${w.issue}</p>`;
});
});
}

// GENERATE
function generate(){
fetch(GAS_URL+"?action=generate")
.then(r=>r.json())
.then(renderJadwal);
}

function renderJadwal(data){
let div=document.getElementById("jadwal");
div.innerHTML="";

for(let t in data){
let html=`<b>${t}</b><br>`;
for(let s in data[t]){
html+=`<span class="shift-${s}">${s}: ${data[t][s]}</span><br>`;
}
div.innerHTML+=html+"<br>";
}
}
</script>

</body>
</html>
