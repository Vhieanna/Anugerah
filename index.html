<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .btn-main { background: #0ea5e9; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 700; margin-top: 15px; }
        .btn-guest { background: white; color: #64748b; border: 1px solid #e2e8f0; padding: 11px; border-radius: 12px; width: 100%; margin-top: 10px; font-weight: 600; }
        .hidden { display: none !important; }
        #loader { color: #0ea5e9; font-size: 0.85rem; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div id="login-ui" class="auth-card">
    <h3 class="fw-bold mb-4">MEDI SIFT</h3>
    <input type="text" id="userInput" class="form-control mb-2 text-center" placeholder="Username">
    <input type="password" id="passInput" class="form-control mb-3 text-center" placeholder="Password">
    <button onclick="proses('admin')" class="btn btn-main">Masuk Admin</button>
    <button onclick="proses('guest')" class="btn btn-guest">Lihat Jadwal (Tamu)</button>
    <div id="loader" class="hidden">Menghubungkan ke server...</div>
</div>

<div id="dash-ui" class="hidden text-center p-4">
    <div class="auth-card" style="max-width: 600px;">
        <h4 id="greet" class="fw-bold text-primary mb-3"></h4>
        <div id="table-area" class="small text-start"></div>
        <button onclick="location.reload()" class="btn btn-outline-danger w-100 mt-4">Keluar</button>
    </div>
</div>

<script>
    // GANTI URL DI BAWAH INI DENGAN URL EXEC ANDA
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGhc19D-Vr6IhWLXW-sSRy1wi0d-ucAARCH3LoVJ6Y91lCiEwFwk7c1E_wSrKFV-gjtw/exec";

    function proses(role) {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        const loader = document.getElementById('loader');

        if(role === 'admin' && (!u || !p)) return alert("Username & Password wajib diisi");

        loader.classList.remove('hidden');

        // Setup JSONP
        const cbName = 'cb_' + Date.now();
        const timeout = setTimeout(() => {
            loader.classList.add('hidden');
            alert("Koneksi lambat atau URL salah. Silakan coba lagi.");
        }, 15000); // 15 detik timeout

        window[cbName] = function(res) {
            clearTimeout(timeout);
            loader.classList.add('hidden');
            if(res.status === "success") {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('dash-ui').classList.remove('hidden');
                document.getElementById('greet').innerText = "Halo, " + (res.name || "Tamu");
                if(res.data) renderTable(res.data);
            } else {
                alert(res.message);
            }
        };

        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?action=${role==='admin'?'login':'get_roster'}&user=${u}&pw=${p}&callback=${cbName}`;
        document.body.appendChild(script);
    }

    function renderTable(data) {
        let h = '<table class="table table-bordered table-sm mt-3"><tbody>';
        data.slice(0, 5).forEach(r => {
            h += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>';
        });
        h += '</tbody></table><p class="text-muted text-center" style="font-size:0.7rem">Menampilkan 5 baris pertama...</p>';
        document.getElementById('table-area').innerHTML = h;
    }
</script>
</body>
</html>
