<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --med-blue: #007bff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f8fafc; overflow: hidden; font-family: sans-serif; }

        /* SPLASH SCREEN PROFESIONAL (FADE EFFECT) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            /* Efek Facebook: Fade Out saat selesai */
            transition: opacity 1s ease-out, visibility 1s;
            opacity: 1; visibility: visible;
        }
        #splash-screen.fade-away { opacity: 0; visibility: hidden; }

        /* Logo Splash Dikecilkan */
        .splash-logo { width: 180px; height: auto; margin-bottom: 20px; animation: fadeIn 1.5s ease-in; }
        
        /* Tagline Splash */
        .splash-tagline { font-size: 16px; color: #6c757d; font-weight: 500; letter-spacing: 0.5px; animation: fadeIn 2s ease-in; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LOGIN PAGE */
        .auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { 
            background: white; padding: 60px 40px; border-radius: 40px; 
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 70px rgba(0,0,0,0.07); border: 1px solid #f1f5f9;
        }
        .login-logo { width: 300px; height: auto; margin-bottom: 40px; display: block; margin-left: auto; margin-right: auto; }
        .form-control { border-radius: 15px; padding: 14px; border: 1.5px solid #e2e8f0; margin-bottom: 15px; text-align: center; font-size: 16px; }
        .btn-main { background: var(--med-blue); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .btn-guest { background: #f0f9ff; color: var(--med-blue); border: none; padding: 14px; border-radius: 15px; width: 100%; margin-top: 12px; font-weight: 600; }
        
        .hidden { display: none !important; }
        #loading-text { color: var(--med-blue); font-size: 0.9rem; margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="logo splash.png" alt="Splash Logo" class="splash-logo">
    <p class="splash-tagline">Your Health, Our Priority</p>
    <div class="spinner-border text-primary mt-4" role="status"></div>
</div>

<div id="app-content" class="hidden">
    <div class="auth-container">
        <div id="login-ui" class="auth-card">
            <img src="Logo Medi.png" alt="Medi Sift Logo" class="login-logo">
            
            <div id="input-area">
                <input type="text" id="userInput" class="form-control" placeholder="Username" autocomplete="off">
                <input type="password" id="passInput" class="form-control" placeholder="Password">
                
                <button onclick="prosesData('login')" class="btn btn-main shadow-sm">Masuk Admin</button>
                <button onclick="prosesData('guest')" class="btn btn-guest">Lihat Jadwal (Tamu)</button>
            </div>

            <div id="loading-text" class="hidden">
                <div class="spinner-grow spinner-grow-sm me-2"></div> Menghubungkan...
            </div>
        </div>

        <div id="dash-ui" class="hidden auth-card shadow-lg" style="max-width: 950px; width: 95%;">
            <h3 id="user-greet" class="text-primary fw-bold mb-4"></h3>
            <div id="table-output" class="table-responsive text-start small"></div>
            <button onclick="location.reload()" class="btn btn-outline-danger mt-4 px-5 rounded-pill">Keluar</button>
        </div>
    </div>
</div>

<script>
    // URL API yang sudah kita verifikasi aktif
    const API_URL = "https://script.google.com/macros/s/AKfycbyZxSlkwBzm06xCmKxm7xVckSxoTKgyRpY-5moj5nLWRvkgut_vFXGuQeHaperOvLNGKw/exec";

    // Splash Screen logic (Facebook style fade)
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            // Tambahkan class untuk Fade Out
            splash.classList.add('fade-away');
            
            // Tampilkan konten utama setelah Fade Out selesai
            setTimeout(() => {
                document.getElementById('app-content').classList.remove('hidden');
                document.body.style.overflow = 'auto';
            }, 1000); // Sinkron dengan transition CSS
        }, 3000); // Tampil selama 3 detik
    });

    function prosesData(tipe) {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        const load = document.getElementById('loading-text');
        const area = document.getElementById('input-area');

        if(tipe === 'login' && (!u || !p)) return alert("Masukkan Username & Password!");

        load.classList.remove('hidden');
        area.classList.add('hidden');

        // Menggunakan teknik JSONP untuk menembus CORS browser
        const callbackName = 'google_jsonp_' + Math.floor(Math.random() * 100000);
        window[callbackName] = function(res) {
            load.classList.add('hidden');
            if(res.status === "success") {
                renderDashboard(res, tipe);
            } else {
                area.classList.remove('hidden');
                alert("Gagal: " + res.message);
            }
            delete window[callbackName];
            const s = document.getElementById('jsonp-script');
            if(s) s.remove();
        };

        const script = document.createElement('script');
        script.id = 'jsonp-script';
        // URL harus bersih dari /u/6/ agar tidak terblokir
        script.src = `${API_URL}?action=${tipe === 'login' ? 'login' : 'get_roster'}&user=${encodeURIComponent(u)}&pw=${encodeURIComponent(p)}&callback=${callbackName}`;
        
        // PENTING: Tangkap error jika script gagal dimuat (Blocked oleh browser)
        script.onerror = () => {
            load.classList.add('hidden');
            area.classList.remove('hidden');
            alert("Koneksi ditolak oleh browser. Pastikan Google Web App sudah di-Deploy sebagai 'Anyone'.");
        };
        document.body.appendChild(script);
    }

    function renderDashboard(res, tipe) {
        document.getElementById('login-ui').classList.add('hidden');
        document.getElementById('dash-ui').classList.remove('hidden');
        document.getElementById('user-greet').innerText = "Halo, " + (tipe === 'login' ? res.name : "Tamu");
        
        if(res.data) {
            let table = '<table class="table table-hover table-bordered border-light table-striped shadow-sm">';
            res.data.forEach((row, idx) => {
                table += `<tr class="${idx === 0 ? 'table-primary' : ''}">`;
                row.forEach(cell => {
                    table += `<td>${cell}</td>`;
                });
                table += '</tr>';
            });
            document.getElementById('table-output').innerHTML = table + '</table>';
        }
    }
</script>
</body>
</html>
