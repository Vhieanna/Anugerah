<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f8fafc; overflow: hidden; font-family: sans-serif; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s; }
        #splash img { width: 280px; height: auto; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .auth-card { background: white; padding: 50px 40px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 70px rgba(0,0,0,0.07); }
        .login-logo { width: 320px; height: auto; margin-bottom: 30px; }
        .form-control { border-radius: 15px; padding: 14px; margin-bottom: 15px; text-align: center; border: 1.5px solid #e2e8f0; }
        .btn-main { background: #007bff; color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: 700; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo splash.png">
    <div class="spinner-border text-primary mt-4"></div>
</div>

<div id="app" class="hidden d-flex align-items: center; justify-content: center; height: 100vh;">
    <div id="login-ui" class="auth-card">
        <img src="Logo Medi.png" class="login-logo">
        <div id="fields">
            <input type="text" id="user" class="form-control" placeholder="Username">
            <input type="password" id="pass" class="form-control" placeholder="Password">
            <button onclick="kirim('login')" class="btn btn-main">Masuk Admin</button>
            <button onclick="kirim('guest')" class="btn btn-main mt-2" style="background:#f0f9ff; color:#007bff;">Lihat Jadwal (Tamu)</button>
        </div>
        <div id="loading" class="hidden mt-3 text-primary fw-bold">
            <div class="spinner-grow spinner-grow-sm me-2"></div> Menghubungkan...
        </div>
    </div>

    <div id="dash" class="hidden auth-card" style="max-width: 900px;">
        <h3 id="greet" class="text-primary fw-bold mb-4"></h3>
        <div id="out" class="table-responsive small"></div>
        <button onclick="location.reload()" class="btn btn-outline-danger mt-4 rounded-pill">Keluar</button>
    </div>
</div>

<script>
    // URL API TETAP SAMA (PASTIKAN SUDAH DEPLOY ULANG SEBAGAI 'ANYONE')
    const API = "https://script.google.com/macros/s/AKfycbyZxSlkwBzm06xCmKxm7xVckSxoTKgyRpY-5moj5nLWRvkgut_vFXGuQeHaperOvLNGKw/exec";

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }, 800);
        }, 3000);
    };

    function kirim(tipe) {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('fields').classList.add('hidden');

        const cb = 'jsonp_' + Date.now();
        window[cb] = (res) => {
            document.getElementById('loading').classList.add('hidden');
            if(res.status === "success") {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
                document.getElementById('greet').innerText = "Halo, " + (res.name || "Tamu");
                if(res.data) {
                    let t = '<table class="table table-bordered">';
                    res.data.forEach(r => t += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>');
                    document.getElementById('out').innerHTML = t + '</table>';
                }
            } else {
                alert(res.message);
                document.getElementById('fields').classList.remove('hidden');
            }
        };

        const s = document.createElement('script');
        s.src = `${API}?action=${tipe}&user=${encodeURIComponent(u)}&pw=${encodeURIComponent(p)}&callback=${cb}`;
        s.onerror = () => {
            alert("Koneksi gagal. Pastikan Web App sudah di-Deploy sebagai 'Anyone'.");
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('fields').classList.remove('hidden');
        };
        document.body.appendChild(s);
    }
</script>
</body>
</html>
