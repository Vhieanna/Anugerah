<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT | System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card-login { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .hidden { display: none !important; }
        #debug-msg { font-size: 10px; color: red; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-ui" class="card-login">
    <h3 class="fw-bold text-primary mb-4">MEDI SIFT</h3>
    <input type="text" id="u" class="form-control mb-2 text-center" placeholder="Username">
    <input type="password" id="p" class="form-control mb-3 text-center" placeholder="Password">
    <button onclick="auth('admin')" id="btnA" class="btn btn-primary w-100 mb-2">Masuk Admin</button>
    <button onclick="auth('guest')" id="btnG" class="btn btn-outline-secondary w-100">Lihat Jadwal (Tamu)</button>
    <div id="loading" class="mt-3 small text-muted hidden">🔄 Sedang verifikasi...</div>
    <div id="debug-msg"></div>
</div>

<div id="dash-ui" class="hidden text-center">
    <div class="card-login">
        <h4 id="welcome" class="fw-bold text-success"></h4>
        <p>Akses Berhasil Terbuka</p>
        <button onclick="location.reload()" class="btn btn-danger w-100 mt-3">Keluar</button>
    </div>
</div>

<script>
    // GANTI URL DI BAWAH INI DENGAN URL BARU HASIL "NEW DEPLOYMENT"
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSldiId5O5KGG15NzTmFpc9xTH7XFQgsfg09OCCdZ6yYM2mFe1i5CgYaijUAoXNQERHg/exec";

    function auth(role) {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        const load = document.getElementById('loading');
        const debug = document.getElementById('debug-msg');

        if(role === 'admin' && (!user || !pass)) return alert("Isi Username & Password!");

        load.classList.remove('hidden');
        debug.innerText = "";

        // Buat ID unik untuk callback
        const cbName = "callback_" + Math.floor(Math.random() * 100000);
        
        // Timer Error (jika 10 detik tidak ada respon)
        const timeout = setTimeout(() => {
            load.classList.add('hidden');
            debug.innerText = "Error: Timeout (Google Script tidak merespon). Cek apakah URL sudah 'Anyone'.";
        }, 10000);

        window[cbName] = function(res) {
            clearTimeout(timeout);
            load.classList.add('hidden');
            if(res.status === "success") {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('dash-ui').classList.remove('hidden');
                document.getElementById('welcome').innerText = "Halo, " + (res.name || "Tamu");
            } else {
                debug.innerText = "Server: " + res.message;
            }
            // Bersihkan sisa-sisa script tag
            const oldScript = document.getElementById('jsonp-tag');
            if(oldScript) document.body.removeChild(oldScript);
            delete window[cbName];
        };

        const script = document.createElement('script');
        script.id = 'jsonp-tag';
        script.src = `${SCRIPT_URL}?action=${role==='admin'?'login':'get_roster'}&user=${encodeURIComponent(user)}&pw=${encodeURIComponent(pass)}&callback=${cbName}`;
        
        // Tangkap error jika script gagal dimuat (URL Salah)
        script.onerror = function() {
            clearTimeout(timeout);
            load.classList.add('hidden');
            debug.innerText = "Error: Gagal memanggil script. Cek kembali URL EXEC Anda.";
        };

        document.body.appendChild(script);
    }
</script>
</body>
</html>
