<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aster Atas | Smart Roster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; --bg: #f8fafc; --text: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Login UI */
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 10% 20%, #f0f9ff 0%, #ffffff 90%); }
        .login-card { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; text-align: center; }
        .brand-icon { width: 60px; height: 60px; background: var(--primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3); }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 600; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { background: #0284c7; transform: translateY(-2px); }
        .btn-guest { background: #f1f5f9; color: #64748b; border: none; padding: 12px; border-radius: 14px; width: 100%; margin-top: 10px; font-weight: 500; }

        /* Dashboard UI */
        .sidebar { width: 280px; position: fixed; height: 100vh; background: white; border-right: 1px solid #e2e8f0; padding: 30px 20px; }
        .main-content { margin-left: 280px; padding: 40px; }
        .nav-link-med { display: flex; align-items: center; padding: 15px; border-radius: 12px; color: #64748b; text-decoration: none; margin-bottom: 5px; font-weight: 500; }
        .nav-link-med.active { background: #f0f9ff; color: var(--primary); font-weight: 600; }
        .card-panel { background: white; border-radius: 24px; padding: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <div class="brand-icon">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        </div>
        <h4 class="fw-bold mb-1">Aster Atas</h4>
        <p class="small text-muted mb-4">Rumah Sakit Management System</p>
        <input type="password" id="passInput" class="form-control mb-3 text-center border-0 bg-light py-3 rounded-4" placeholder="Password Admin">
        <button onclick="handleAction('login')" id="btnLogin" class="btn-main">Masuk Admin</button>
        <button onclick="enterGuest()" class="btn-guest">Akses Tamu (Lihat Jadwal)</button>
    </div>
</div>

<div id="main-dashboard" class="hidden">
    <div class="sidebar">
        <h5 class="fw-bold px-3 mb-5">Menu Utama</h5>
        <nav>
            <a href="#" class="nav-link-med active" onclick="showTab('roster', event)">📅 Jadwal Aktif</a>
            <div id="admin-section" class="hidden">
                <a href="#" class="nav-link-med" onclick="showTab('gen', event)">🚀 Generate Jadwal</a>
                <a href="#" class="nav-link-med" onclick="showTab('req', event)">📝 Permintaan Staf</a>
            </div>
        </nav>
        <button onclick="location.reload()" class="btn btn-outline-danger w-100 rounded-4 mt-5">Sign Out</button>
    </div>

    <div class="main-content">
        <div id="tab-roster" class="tab-content">
            <h3 class="fw-bold mb-4">Jadwal Perawat</h3>
            <div class="card-panel">
                <p id="roster-info">Memuat data terbaru dari database...</p>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <tbody id="roster-data"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-gen" class="tab-content hidden">
            <h3 class="fw-bold mb-4">Generator</h3>
            <div class="card-panel text-center py-5">
                <p class="text-muted">Susun jadwal otomatis berdasarkan Anti-Pairing & MOD RS.</p>
                <button onclick="handleAction('run_build')" id="btnBuild" class="btn-main w-auto px-5">Mulai Build</button>
                <div id="status-build" class="mt-3 small text-primary"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // GANTI DENGAN URL WEB APP GAS ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxa2tcEkd3khZ9Tlew7RrTeFaj_agodnr5cauYUWJmtmyLQ0hpmmqDV0KNQqwd6lq3ZTA/exec";
    let adminKey = "";

    async function handleAction(action) {
        const pw = document.getElementById('passInput').value;
        const btn = (action === 'login') ? document.getElementById('btnLogin') : document.getElementById('btnBuild');
        
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const response = await fetch(`${GAS_URL}?action=${action}&pw=${encodeURIComponent(pw || adminKey)}`);
            const data = await response.json();
            
            if (data.status === "success") {
                if (action === 'login') {
                    adminKey = pw;
                    document.getElementById('admin-section').classList.remove('hidden');
                    enterDashboard();
                } else {
                    document.getElementById('status-build').innerText = data.message;
                }
            } else { alert(data.message); }
        } catch (e) { alert("Koneksi gagal!"); }
        
        btn.disabled = false;
        btn.innerText = (action === 'login') ? "Masuk Admin" : "Mulai Build";
    }

    function enterGuest() { enterDashboard(); }

    function enterDashboard() {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
    }

    function showTab(tab, e) {
        e.preventDefault();
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-link-med').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        e.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
