<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MediSift</title>

<style>
body {
  font-family: Arial;
  background: #eef7fb;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 12px;
}

.btn {
  background: linear-gradient(to right, #2bb3c0, #6dd5ed);
  border: none;
  padding: 10px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

h2 {
  color: #2bb3c0;
}
</style>
</head>

<body>

<div class="card" id="loginPage">
  <h2>MediSift</h2>

  <label>Username</label><br>
  <input id="username"><br>

  <label>Password</label><br>
  <input id="password" type="password"><br>

  <button class="btn" onclick="login()">Login</button>
  <button class="btn" onclick="guest()">Guest</button>
</div>

<div id="app" style="display:none">

  <div class="card">
    <div id="userInfo"></div>
  </div>

  <div class="card">
    <h2>Konflik Jadwal</h2>
    <div id="konflik"></div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxSndXWAHON5S6dMlFKy9EenhzRVbmToFC-NwqtV-mNVaytydPWnlaKOywMgqJodloZ/exec";

let role = "";
let currentUser = "";

// ================= LOGIN =================
function login() {
  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      username: username.value,
      password: password.value
    })
  })
  .then(res => res.json())
  .then(res => {
    if (res.role === "admin") {
      role = "admin";
      currentUser = res.name;
      showApp();
    } else {
      alert("Login gagal");
    }
  });
}

function guest() {
  role = "guest";
  currentUser = "Guest";
  showApp();
}

function showApp() {
  loginPage.style.display = "none";
  app.style.display = "block";

  document.getElementById("userInfo").innerText =
    "Login sebagai: " + currentUser;

  loadKonflik();
}

// ================= LOAD KONFLIK =================
function loadKonflik() {
  fetch(GAS_URL + "?action=konflik")
    .then(res => res.json())
    .then(renderKonflik);
}

// ================= RENDER =================
function renderKonflik(data) {
  let div = document.getElementById("konflik");
  div.innerHTML = "";

  for (let tgl in data) {
    let k = data[tgl];

    let html = `<h3>${tgl}</h3>`;

    k.kandidat.forEach(c => {
      html += `
        <label>
          <input type="radio" name="${tgl}" value="${c.nama}">
          ${c.nama} (${c.jumlah} request)
        </label><br>
      `;
    });

    if (role === "admin") {
      html += `<button class="btn" onclick="pilih('${tgl}')">Pilih</button>`;
    } else {
      html += `<p><i>Guest hanya melihat</i></p>`;
    }

    div.innerHTML += html;
  }
}

// ================= PILIH =================
function pilih(tanggal) {
  let radios = document.getElementsByName(tanggal);
  let dipilih;

  radios.forEach(r => {
    if (r.checked) dipilih = r.value;
  });

  if (!dipilih) {
    alert("Pilih dulu");
    return;
  }

  let ditolak = Array.from(radios)
    .map(r => r.value)
    .filter(n => n !== dipilih)[0];

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "pilih",
      tanggal: tanggal,
      dipilih: dipilih,
      ditolak: ditolak,
      admin: currentUser
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Keputusan disimpan");
    loadRekomendasi(ditolak);
  });
}

// ================= REKOMENDASI =================
function loadRekomendasi(nama) {
  fetch(GAS_URL + "?action=rekomendasi&nama=" + nama)
    .then(res => res.json())
    .then(res => {
      let html = `<h3>Rekomendasi untuk ${nama}</h3>`;
      res.forEach(t => html += `<p>${t}</p>`);

      document.getElementById("konflik").innerHTML += html;
    });
}
</script>

</body>
</html>
