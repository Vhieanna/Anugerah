<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT | Hospital System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg-soft: #f8fafc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-soft); overflow: hidden; }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #splash-screen img { width: 180px; height: auto; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* AUTH CARD */
        .container-flex { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .card-auth { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f1f5f9; }
        .app-logo { width: 70px; height: auto; margin-bottom: 15px; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; margin-bottom: 12px; text-align: center; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; width: 100%; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .btn-guest { background: white; color: var(--primary); border: 2px solid #f0f9ff; padding: 12px; border-radius: 14px; width: 100%; margin-top: 10px; font-weight: 600; }
        
        .hidden { display: none !important; }
        #loader { color: var(--primary); font-size: 0.85rem; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="Logo Splash.png" alt="Splash Logo">
    <div class="spinner-border text-primary" role="status"></div>
</div>

<div id="main-content" class="hidden">
    <div class="container-flex">
        <div id="login-ui" class="card-auth">
            <img src="Logo Medi.png" alt="Logo Medi" class="app-logo">
            <h4 class="fw-bold mb-1">MEDI SIFT</h4>
            <p class="text-muted small mb-4">Smart Scheduling System</p>
            
            <div id="input-fields">
                <input type="text" id="userInput" class="form-control" placeholder="Username">
                <input type="password" id="passInput" class="form-control" placeholder="Password">
                
                <button onclick="eksekusi('admin')" class="btn btn-main">Masuk Admin</button>
                <button onclick="eksekusi('guest')" class="btn btn-guest">Lihat Jadwal (Tamu)</button>
            </div>

            <div id="loader" class="hidden">
                Menghubungkan ke pusat data...
            </div>
        </div>

        <div id="dash-ui" class="hidden card-auth" style="max-width: 800px;">
            <h4 id="welcome-msg" class="text-primary fw-bold"></h4>
            <hr>
            <div id="data-display" class="table-responsive text-start small"></div>
            <button onclick="location.reload()" class="btn btn-outline-danger mt-3 btn-sm">Keluar</button>
        </div>
    </div>
</div>

<script>
    // URL API (Tanpa /u/6/)
    const API_URL = "https://script.google.com/macros/s/AKfycbyZxSlkwBzm06xCmKxm7xVckSxoTKgyRpY-5moj5nLWRvkgut_vFXGuQeHaperOvLNGKw/exec";

    // Efek Splash Screen
    window.onload = () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.body.style.overflow = 'auto';
            }, 800);
        }, 3000); // 3 Detik
    };

    function eksekusi(role) {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        const loader = document.getElementById('loader');
        const fields = document.getElementById('input-fields');

        if(role === 'admin' && (!u || !p)) return alert("Isi Username & Password!");

        loader.classList.remove('hidden');
        fields.classList.add('hidden');

        // JSONP Callback
        const cbName = 'jsonp_' + Math.floor(Math.random() * 100000);
        window[cbName] = function(res) {
            loader.classList.add('hidden');
            if(res.status === "success") {
                renderDashboard(res, role);
            } else {
                fields.classList.remove('hidden');
                alert(res.message);
            }
            delete window[cbName];
        };

        const script = document.createElement('script');
        script.src = `${API_URL}?action=${role==='admin'?'login':'get_roster'}&user=${encodeURIComponent(u)}&pw=${encodeURIComponent(p)}&callback=${cbName}`;
        script.onerror = () => {
            alert("Gagal memuat data. Periksa koneksi internet.");
            loader.classList.add('hidden');
            fields.classList.remove('hidden');
        };
        document.body.appendChild(script);
    }

    function renderDashboard(res, role) {
        document.getElementById('login-ui').classList.add('hidden');
        document.getElementById('dash-ui').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Halo, " + (role === 'admin' ? res.name : "Tamu");
        
        if(res.data) {
            let tbl = '<table class="table table-bordered table-sm mt-2">';
            res.data.forEach(row => {
                tbl += '<tr>' + row.map(c => `<td>${c}</td>`).join('') + '</tr>';
            });
            document.getElementById('data-display').innerHTML = tbl + '</table>';
        }
    }
</script>
</body>
</html>
