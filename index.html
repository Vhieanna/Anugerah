<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT | Aster Atas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --med-blue: #007bff; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        #splash { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .wrapper { display: flex; height: 100vh; opacity: 0; transition: 1s; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e2e8f0; padding: 40px 20px; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .nav-link { padding: 12px 15px; border-radius: 12px; color: #64748b; cursor: pointer; font-weight: 600; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #eff6ff; color: var(--med-blue); }
        .glass-card { background: #fff; border-radius: 25px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo splash.png" width="150">
    <div class="mt-2 text-muted small fw-bold">Your Health, Our Priority</div>
    <div class="spinner-border text-primary mt-4" role="status"></div>
</div>

<div id="app" class="wrapper">
    <div class="sidebar">
        <img src="Logo Medi.png" width="200" class="mb-5">
        <div class="nav-link active" onclick="tab('req')"><i class="bi bi-pencil-square me-2"></i> Permintaan</div>
        <div class="nav-link" onclick="tab('gen')"><i class="bi bi-cpu me-2"></i> Generate</div>
        <div class="nav-link" onclick="tab('log')"><i class="bi bi-journal-text me-2"></i> Log Keputusan</div>
        <div class="mt-auto"><hr><div class="nav-link text-danger" onclick="location.reload()"><i class="bi bi-power me-2"></i> Keluar</div></div>
    </div>

    <div class="content">
        <div id="tab-req">
            <h2 class="fw-bold mb-4">Input Permintaan Staf</h2>
            <div class="glass-card mb-4">
                <div class="row g-3">
                    <div class="col-md-3"><label class="small fw-bold">Nama Staf</label><select id="staf" class="form-select"></select></div>
                    <div class="col-md-3"><label class="small fw-bold">Tanggal</label><input type="date" id="tgl" class="form-control"></div>
                    <div class="col-md-3"><label class="small fw-bold">Jenis</label>
                        <select id="jns" class="form-select">
                            <option value="Off">Off</option><option value="Tukar">Tukar Shift</option><option value="Cuti">Cuti</option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="small fw-bold">Shift</label>
                        <select id="shf" class="form-select">
                            <option value="P">Pagi (P)</option><option value="S">Siang (S)</option><option value="M">Malam (M)</option>
                        </select>
                    </div>
                    <div class="col-12 text-end mt-4"><button onclick="saveReq()" class="btn btn-primary px-5 rounded-pill fw-bold">Simpan</button></div>
                </div>
            </div>
            <div id="msg" class="hidden alert alert-warning rounded-4 border-0"></div>
        </div>

        <div id="tab-gen" class="hidden">
            <h2 class="fw-bold mb-4">Pembuat Jadwal</h2>
            <div class="glass-card text-center py-5">
                <i class="bi bi-gear-wide-connected display-1 text-primary mb-4"></i>
                <h5>Siap menyusun jadwal otomatis?</h5>
                <div class="d-flex justify-content-center gap-2 mt-4">
                    <select id="bln" class="form-select w-25"><option value="5">Mei</option><option value="6">Juni</option></select>
                    <button onclick="generate()" class="btn btn-primary px-5 rounded-pill fw-bold">Generate Sekarang</button>
                </div>
            </div>
        </div>

        <div id="tab-log" class="hidden">
            <h2 class="fw-bold mb-4">Histori Keputusan</h2>
            <div class="glass-card" id="log-tbl"></div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxj9kN_gxn4xckoQefnAeAmkqf7VlFRc5PD1U17DxkaxRYJNb1E1c7YWaVqlYjJ6-NgqA/exec";

    window.onload = () => {
        setTimeout(() => { document.getElementById('splash').style.opacity='0'; setTimeout(()=>{ 
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('app').style.opacity='1';
            loadStaf();
        }, 800); }, 3000);
    };

    function call(p, c) {
        const cb = 'j_' + Date.now(); window[cb] = c;
        const s = document.createElement('script'); s.src = `${API}?${p}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function loadStaf() { call('action=get_staf', r => {
        document.getElementById('staf').innerHTML = r.data.map(s => `<option value="${s}">${s}</option>`).join('');
    });}

    function saveReq() {
        const p = `action=submit_request&nama=${document.getElementById('staf').value}&tanggal=${document.getElementById('tgl').value}&jenis=${document.getElementById('jns').value}&shift=${document.getElementById('shf').value}`;
        call(p, r => {
            if(r.status === 'conflict') {
                document.getElementById('msg').classList.remove('hidden');
                document.getElementById('msg').innerHTML = `<b>${r.message}</b> ${r.saran}`;
            } else {
                alert(r.message);
                document.getElementById('msg').classList.add('hidden');
            }
        });
    }

    function generate() {
        call(`action=generate&bulan=${document.getElementById('bln').value}&tahun=2026`, r => alert(r.message));
    }

    function tab(t) {
        ['req','gen','log'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(t === 'log') loadLog();
    }

    function loadLog() {
        call('action=get_log', r => {
            let h = '<table class="table small"><thead><tr><th>Nama</th><th>Tgl</th><th>Status</th><th>Ket</th></tr></thead><tbody>';
            r.data.slice(1).reverse().forEach(row => {
                h += `<tr><td>${row[1]}</td><td>${row[2]}</td><td><span class="badge ${row[3]=='DISETUJUI'?'bg-success':'bg-danger'}">${row[3]}</span></td><td>${row[4]}</td></tr>`;
            });
            document.getElementById('log-tbl').innerHTML = h + '</tbody></table>';
        });
    }
</script>
</body>
</html>
