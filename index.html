<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
    .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 16px; }
    .btn-github { background-color: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); font-weight: 500; }
    .btn-github:hover { background-color: #2ea043; color: white; }
    .card-github { background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; }
    .repo-header { padding: 16px; background-color: #161b22; border-bottom: 1px solid #30363d; border-radius: 6px 6px 0 0; }
    .status-dot { height: 10px; width: 10px; background-color: #238636; border-radius: 50%; display: inline-block; margin-right: 5px; }
    code { color: #ff7b72; }
    .branch-tag { background-color: #1f6feb26; color: #58a6ff; padding: 2px 10px; border-radius: 2em; font-size: 12px; font-weight: 500; }
  </style>
</head>
<body>

<nav class="navbar mb-4">
  <div class="container">
    <span class="navbar-brand mb-0 h1 text-white">
      <svg height="32" viewBox="0 0 16 16" width="32" style="fill:white; margin-right:10px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
      ruangan-anggrek / <strong>roster-engine</strong>
      <span class="branch-tag ms-2">main</span>
    </span>
  </div>
</nav>

<div class="container">
  <div class="row">
    <div class="col-md-8">
      <div class="card card-github mb-4">
        <div class="repo-header">
          <span class="status-dot"></span> <strong>Production Ready</strong>
          <span class="float-end text-muted">v1.0.4-stable</span>
        </div>
        <div class="p-4">
          <h5>System Control Panel</h5>
          <p class="text-muted">Klik tombol di bawah untuk menjalankan algoritma penjadwalan otomatis.</p>
          <hr style="border-color: #30363d;">
          <div class="d-flex gap-2">
            <button class="btn btn-github" onclick="runBuild()">Run Workflow</button>
            <button class="btn btn-outline-secondary" style="color:#c9d1d9; border-color:#30363d;">View Logs</button>
          </div>
          <div id="output" class="mt-4 p-3 border rounded" style="background:#161b22; border-color:#30363d; display:none;">
            <code id="message"></code>
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-md-4">
      <div class="card card-github p-3">
        <h6>About</h6>
        <p class="small text-muted">Automated Nurse Scheduling System with Anti-Pairing Logic and MOD Integration.</p>
        <div class="mt-2"><small>⭐ 11 Contributors</small></div>
      </div>
    </div>
  </div>
</div>

<script>
  function runBuild() {
    const btn = event.target;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Deploying...';
    btn.disabled = true;
    
    google.script.run
      .withSuccessHandler(function(res) {
        document.getElementById('output').style.display = 'block';
        document.getElementById('message').innerText = '> ' + res.message;
        btn.innerHTML = 'Run Workflow';
        btn.disabled = false;
      })
      .generateAutomatedRoster('Mei', '2026');
  }
</script>

</body>
</html>
