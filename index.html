<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT | Aster Atas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --med-blue: #007bff; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #splash { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        #login-page { position: fixed; inset: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 9998; }
        .wrapper { display: flex; height: 100vh; opacity: 0; transition: 1s; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #eef2f6; padding: 30px 15px; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .nav-link { padding: 12px; border-radius: 10px; color: #64748b; cursor: pointer; font-weight: 600; margin-bottom: 5px; }
        .nav-link.active { background: #eff6ff; color: var(--med-blue); }
        .hidden { display: none !important; }
        .glass { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

<div id="splash">
    <img src="Logo Medi.png" width="150" onerror="this.src='https://via.placeholder.com/150?text=MEDI+SIFT'">
    <div class="spinner-border text-primary mt-4"></div>
</div>

<div id="login-page" class="hidden">
    <div class="bg-white p-4 rounded-4 shadow-sm text-center" style="width: 320px;">
        <h5 class="fw-bold mb-4">Login Admin</h5>
        <input type="text" id="user" class="form-control mb-2 rounded-pill" placeholder="Username">
        <input type="password" id="pass" class="form-control mb-3 rounded-pill" placeholder="Password">
        <button onclick="login()" id="btnLogin" class="btn btn-primary w-100 rounded-pill fw-bold">Masuk</button>
    </div>
</div>

<div id="app" class="wrapper">
    <div class="sidebar d-flex flex-column">
        <div class="nav-link active" onclick="tab('req', this)">Permintaan</div>
        <div class="nav-link" onclick="tab('gen', this)">Generate</div>
        <div class="nav-link" onclick="tab('log', this)">Log Keputusan</div>
        <button class="btn btn-light mt-auto text-danger fw-bold" onclick="location.reload()">Keluar</button>
    </div>
    <div class="content">
        <div id="tab-req" class="tab-content">
            <h2 class="fw-bold mb-4">Input Permintaan</h2>
            <div class="glass">
                <div class="row g-3">
                    <div class="col-md-3"><label class="small fw-bold">Staf</label><select id="staf" class="form-select"></select></div>
                    <div class="col-md-3"><label class="small fw-bold">Tanggal</label><input type="date" id="tgl" class="form-control"></div>
                    <div class="col-md-3"><label class="small fw-bold">Jenis</label><select id="jns" class="form-select"><option value="Off">Off</option><option value="Tukar">Tukar</option></select></div>
                    <div class="col-md-3"><label class="small fw-bold">Shift</label><select id="shf" class="form-select"><option value="P">Pagi</option><option value="S">Siang</option><option value="M">Malam</option></select></div>
                    <div class="col-12 mt-3"><button onclick="save()" class="btn btn-primary px-4">Simpan</button></div>
                </div>
            </div>
        </div>
        <div id="tab-gen" class="tab-content hidden text-center mt-5">
            <button onclick="generate()" class="btn btn-primary btn-lg px-5 shadow">Generate Jadwal Bulan Ini</button>
        </div>
        <div id="tab-log" class="tab-content hidden">
            <h2 class="fw-bold mb-4">Log</h2>
            <div id="log-box"></div>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbz4rYskeDzZ_o-QOpu0nIMDX87DTne8Q0EalsiDdNabN8EYUkqMCrXTnojzX5mfnNYBTQ/exec";

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('login-page').classList.remove('hidden');
        }, 2000);
    };

    function call(p, cb) {
        const n = 'cb_'+Date.now(); window[n] = cb;
        const s = document.createElement('script'); s.src = `${API}?${p}&callback=${n}`;
        document.body.appendChild(s);
    }

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        call(`action=login&user=${u}&pass=${p}`, r => {
            if(r.status==='success') {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('app').style.opacity = '1';
                loadStaf();
            } else { alert(r.message); }
        });
    }

    function loadStaf() {
        call('action=get_staf', r => {
            document.getElementById('staf').innerHTML = r.data.map(s => `<option value="${s}">${s}</option>`).join('');
        });
    }

    function save() {
        const p = `action=submit_request&nama=${document.getElementById('staf').value}&tanggal=${document.getElementById('tgl').value}&jenis=${document.getElementById('jns').value}&shift=${document.getElementById('shf').value}`;
        call(p, r => alert(r.message));
    }

    function generate() {
        call('action=generate', r => alert(r.message));
    }

    function tab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(t==='log') loadLog();
    }

    function loadLog() {
        call('action=get_log', r => {
            let h = '<table class="table"><thead><tr><th>Nama</th><th>Tgl</th><th>Status</th></tr></thead><tbody>';
            r.data.slice(1).reverse().forEach(row => {
                h += `<tr><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td></tr>`;
            });
            document.getElementById('log-box').innerHTML = h + '</tbody></table>';
        });
    }
</script>
</body>
</html>
