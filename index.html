<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aster Atas | System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; margin-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-section" class="login-card">
    <h4 class="fw-bold mb-4">Aster Atas</h4>
    <input type="password" id="passInput" class="form-control text-center py-3 rounded-3 mb-3" placeholder="Password Admin">
    <button onclick="handleLogin()" id="btnLogin" class="btn-main">Masuk Sebagai Admin</button>
</div>

<div id="dashboard-section" class="hidden">
    <div class="p-5 bg-white rounded-4 shadow">
        <h2 class="fw-bold text-primary text-center">Login Berhasil!</h2>
        <p class="text-center mt-3">Selamat datang di Dashboard Admin Aster Atas.</p>
        <button onclick="location.reload()" class="btn btn-outline-danger w-100 mt-4">Keluar</button>
    </div>
</div>

<script>
    // MASUKKAN URL HASIL DEPLOY TERBARU ANDA DI SINI
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxjwyV_1T71hFjBZhL2xRQ-v18qzmgPID5z_KIs29rzM7BEG-VXSTG7WQajgd5oZR2Lzw/exec";

    async function handleLogin() {
        const pw = document.getElementById('passInput').value;
        const btn = document.getElementById('btnLogin');

        if(!pw) return alert("Masukkan password!");

        btn.disabled = true;
        btn.innerText = "Memverifikasi...";

        try {
            // Kita gunakan redirect mode agar tidak terblokir oleh Google Security
            const response = await fetch(`${GAS_URL}?action=login&pw=${encodeURIComponent(pw)}`, {
                method: 'GET',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });

            const data = await response.json();

            if (data.status === "success") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
            } else {
                alert(data.message);
                resetBtn(btn);
            }
        } catch (error) {
            console.error(error);
            alert("Koneksi gagal! Pastikan URL GAS benar dan sudah di-Deploy sebagai 'Anyone'.");
            resetBtn(btn);
        }
    }

    function resetBtn(btn) {
        btn.disabled = false;
        btn.innerText = "Masuk Sebagai Admin";
    }
</script>
</body>
</html>
