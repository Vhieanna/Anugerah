<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aster Atas | Smart Roster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s ease;
        }

        /* LOGIN PAGE MODERN */
        #login-page { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
        }

        .login-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 40px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
            text-align: center;
        }

        .btn-primary-custom { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary-custom:hover { background: var(--primary-hover); color: white; transform: translateY(-1px); }
        
        .btn-guest {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            margin-top: 10px;
        }

        /* DASHBOARD LAYOUT */
        .sidebar {
            background: var(--card);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            width: 260px;
            padding: 24px;
        }

        .main-content { margin-left: 260px; padding: 40px; }

        .nav-pill-custom {
            color: var(--text-muted);
            padding: 12px 16px;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-pill-custom.active {
            background: #eef2ff;
            color: var(--primary);
        }

        .nav-pill-custom:hover:not(.active) { background: #f1f5f9; color: var(--text-main); }

        .card-stats {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        .form-control-custom {
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 10px 15px;
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <div class="mb-4">
            <div style="width: 60px; height: 60px; background: #eef2ff; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </div>
            <h4 class="fw-bold mb-1">Aster Atas</h4>
            <p class="text-muted small">Nurse Scheduling System</p>
        </div>
        
        <div id="login-form">
            <input type="password" id="passInput" class="form-control form-control-custom mb-3 text-center" placeholder="Admin Password">
            <button onclick="checkLogin()" id="btnLogin" class="btn btn-primary-custom w-100 mb-2">Sign In as Admin</button>
            <div class="text-muted small mb-2">or</div>
            <button onclick="enterAsGuest()" class="btn btn-guest w-100">View Schedules as Guest</button>
        </div>
    </div>
</div>

<div id="main-dashboard" class="hidden">
    <div class="sidebar no-print">
        <h5 class="fw-bold mb-4 px-2">Aster Atas</h5>
        <nav>
            <a href="#" class="nav-pill-custom active" onclick="showTab('view-roster', event)">
                📅 Jadwal Perawat
            </a>
            <div id="admin-menus" class="hidden">
                <hr>
                <a href="#" class="nav-pill-custom" onclick="showTab('generator', event)">⚙️ Generator</a>
                <a href="#" class="nav-pill-custom" onclick="showTab('requests', event)">📝 Permintaan</a>
                <a href="#" class="nav-pill-custom" onclick="showTab('antipairing', event)">🚫 Anti Pairing</a>
                <a href="#" class="nav-pill-custom" onclick="showTab('settings', event)">🛠️ Config</a>
            </div>
        </nav>
        <div style="position: absolute; bottom: 24px; width: 212px;">
            <button onclick="location.reload()" class="btn btn-light w-100 text-danger border rounded-3">Sign Out</button>
        </div>
    </div>

    <div class="main-content">
        <div id="tab-view-roster" class="tab-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Jadwal Aktif</h4>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary btn-sm active">Bulan Ini</button>
                    <button class="btn btn-outline-secondary btn-sm">Bulan Depan</button>
                </div>
            </div>
            <div class="card-stats">
                <p class="text-muted">Memuat jadwal terbaru...</p>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead><tr><th>Tanggal</th><th>Shift Pagi</th><th>Sore</th><th>Malam</th></tr></thead>
                        <tbody id="roster-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-generator" class="tab-content hidden">
            <h4 class="fw-bold mb-4">Roster Generator</h4>
            <div class="card-stats">
                <h6>Konfigurasi Build</h6>
                <button onclick="runBuild()" id="btnBuild" class="btn btn-primary-custom px-4 mt-3">Mulai Susun Jadwal</button>
                <div id="console" class="mt-4 p-3 rounded bg-light border small text-muted" style="font-family: monospace;">
                    > System ready...
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // URL Web App GAS Anda
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwMuhPcfSLVAWtTKH90JWEmhHOlVJEQEVx3rwuVI0Uf3SNYXFFSImHiRlapEN_HpZbFag/exec";
    let isAdmin = false;
    let currentPw = "";

    function checkLogin() {
        const pw = document.getElementById('passInput').value;
        const btn = document.getElementById('btnLogin');
        btn.disabled = true;
        btn.innerText = "Authenticating...";

        // Mencoba verifikasi ke GAS
        fetch(`${GAS_URL}?action=login&pw=${pw}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    isAdmin = true;
                    currentPw = pw;
                    document.getElementById('admin-menus').classList.remove('hidden');
                    enterDashboard();
                } else {
                    alert("Password Admin Salah!");
                    btn.disabled = false;
                    btn.innerText = "Sign In as Admin";
                }
            })
            .catch(err => {
                console.error(err);
                alert("Gagal terhubung ke server. Pastikan URL GAS benar.");
                btn.disabled = false;
            });
    }

    function enterAsGuest() {
        isAdmin = false;
        document.getElementById('admin-menus').classList.add('hidden');
        enterDashboard();
    }

    function enterDashboard() {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        loadActiveRoster();
    }

    function showTab(tabId, event) {
        event.preventDefault();
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-pill-custom').forEach(n => n.classList.remove('active'));
        
        document.getElementById('tab-' + tabId).classList.remove('hidden');
        event.target.classList.add('active');
    }

    function loadActiveRoster() {
        // Logika untuk menarik jadwal bulan ini dari GAS
        console.log("Loading roster data...");
    }

    function runBuild() {
        if(!isAdmin) return;
        const con = document.getElementById('console');
        con.innerHTML = "> Fetching constraints...<br>> Processing Maria (MOD) Schedule...";
        
        fetch(`${GAS_URL}?action=run_build&pw=${currentPw}`)
            .then(res => res.json())
            .then(data => {
                con.innerHTML += `<br>> <span style="color:green">SUCCESS: ${data.message}</span>`;
            });
    }
</script>
</body>
</html>
