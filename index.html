<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aster Atas / Roster-Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; }
        .card-github { background-color: #010409; border: 1px solid #30363d; border-radius: 6px; }
        .repo-header { padding: 12px 16px; background-color: #161b22; border-bottom: 1px solid #30363d; border-radius: 6px 6px 0 0; }
        .btn-success-github { background-color: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); font-weight: 500; }
        .btn-success-github:hover { background-color: #2ea043; }
        .form-control-github { background-color: #0d1117; border: 1px solid #30363d; color: #c9d1d9; font-size: 14px; }
        .form-control-github:focus { border-color: #58a6ff; box-shadow: none; background-color: #0d1117; color: white; }
        #console-log { background-color: #0d1117; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; color: #d1d5da; border: 1px solid #30363d; height: 250px; overflow-y: auto; line-height: 1.5; }
        .status-dot { height: 8px; width: 8px; background-color: #238636; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

<nav class="navbar p-3 mb-4">
    <div class="container">
        <span class="navbar-brand text-white fw-bold">
            <svg height="24" viewBox="0 0 16 16" width="24" style="fill:#8b949e; vertical-align: middle;" class="me-2"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            aster-atas / <span class="text-secondary">roster-engine</span>
        </span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card-github p-4 mb-3">
                <h6 class="mb-3 text-white">System Authentication</h6>
                <div class="mb-3">
                    <label class="small text-muted mb-1">Root Password</label>
                    <input type="password" id="adminPw" class="form-control form-control-github" placeholder="****************">
                </div>
                <div class="small text-muted border-top border-secondary pt-2 mt-2">
                    <span class="status-dot"></span> Server: <span class="text-white">Active</span>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card-github">
                <div class="repo-header d-flex justify-content-between align-items-center">
                    <div class="small text-white"><strong>Workflow</strong>: generate_monthly_roster.yml</div>
                    <button id="btnRun" onclick="runWorkflow()" class="btn btn-sm btn-success-github px-3">Run Workflow</button>
                </div>
                <div class="p-4">
                    <div id="console-log" class="p-3 border rounded shadow-sm">
                        <span style="color: #8b949e;"># Aster Atas Scheduler v1.0.0</span><br>
                        > Ready for deployment.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // GANTI INI DENGAN URL WEB APP GOOGLE SCRIPT ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwf22vFuimnFyXI15mq98jGkWlNOQbGc3tg46MV-zCfKm-IW4EN8ba819Qi0ATk7hs0Og/exec";

    function updateLog(msg, color = "#d1d5da") {
        const log = document.getElementById('console-log');
        log.innerHTML += `<br> <span style="color:#8b949e">>>></span> <span style="color:${color}">${msg}</span>`;
        log.scrollTop = log.scrollHeight;
    }

    function runWorkflow() {
        const pw = document.getElementById('adminPw').value;
        const btn = document.getElementById('btnRun');
        
        if (!pw) { alert("Input Root Password!"); return; }

        btn.disabled = true;
        btn.innerText = "Building...";
        updateLog("Starting automated build for Aster Atas...", "#58a6ff");

        fetch(`${GAS_URL}?action=run_build&pw=${pw}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    updateLog(`SUCCESS: ${data.message}`, "#3fb950");
                } else {
                    updateLog(`FAILED: ${data.message}`, "#f85149");
                }
                btn.disabled = false;
                btn.innerText = "Run Workflow";
            })
            .catch(err => {
                updateLog(`CRITICAL ERROR: Failed to reach Google Backend.`, "#f85149");
                btn.disabled = false;
                btn.innerText = "Run Workflow";
            });
    }
</script>

</body>
</html>
