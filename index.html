<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI SIFT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .card { padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-box" class="card">
    <h3 class="fw-bold">MEDI SIFT</h3>
    <p class="text-muted small">viena | 123456</p> <input type="text" id="user" class="form-control mb-2" placeholder="Username">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
    <button onclick="kirim()" class="btn btn-primary w-100">Masuk Admin</button>
    <div id="status" class="mt-3 small text-primary hidden">Memproses...</div>
</div>

<div id="dash" class="card hidden">
    <h2 id="welcome"></h2>
    <p>Akses Berhasil</p>
    <button onclick="location.reload()" class="btn btn-danger">Keluar</button>
</div>

<script>
    // MASUKKAN URL HASIL DEPLOY DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzdUdqbVNyM6kpXFx5uHL0pDb-jVVzAqgGtV6_z80NAsvhflSL20C1bQX_heOgw9D4X7A/exec";

    function kirim() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const stat = document.getElementById('status');

        if (!u || !p) return alert("Isi data!");
        stat.classList.remove('hidden');

        // Gunakan metode JSONP untuk memanggil script
        const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
        window[callbackName] = function(data) {
            stat.classList.add('hidden');
            if (data.status === "success") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
                document.getElementById('welcome').innerText = "Halo, " + data.name;
            } else {
                alert(data.message);
            }
            delete window[callbackName];
            document.body.removeChild(script);
        };

        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?action=login&user=${u}&pw=${p}&callback=${callbackName}`;
        document.body.appendChild(script);
    }
</script>
</body>
</html>
